# ===== tmux 設定 (devbox セッション層: issue #214 Phase 1) =====
# どのクライアント (WezTerm / 素の ssh / iPad) から入っても
# `tmux new -As main` で同一セッションに attach する運用の土台。

# --- 基本 ---
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"   # truecolor
# ESC 遅延はほぼゼロに (nvim 用)。ただし 0 にすると SSH 越しに分割着信した
# エスケープシーケンス (DA 応答やマウスイベント) が生テキストとして
# シェルに漏れるため、わずかに待つ。
set -s escape-time 10
set -g history-limit 100000
set -g mouse on
set -g focus-events on                      # nvim の autoread 等に必要
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# --- OSC パススルー ---
# claude_notify の SetUserVar (OSC 1337) や OSC 7 (cwd 通知) を
# tmux 越しに WezTerm まで透過させる。マルチクライアント同期の要。
set -g allow-passthrough on
set -g set-clipboard on

# --- ペイン操作 ---
# prefix はデフォルトの C-b のまま (zsh emacs キーバインドとの衝突が比較的少ない)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
# ウィンドウ/ペインを確認なしで閉じる (WezTerm の Ctrl+w / LEADER+x からブリッジ。
# 既定の y/n 確認を外す)
bind & kill-window
bind x kill-pane
# Alt+矢印でプレフィックスなしペイン移動
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D
# Alt+hjkl: その方向にペインがあれば移動、端ならアプリ (nvim 等) にキーを透過
# (WezTerm の activate_pane_or_send_alt と同じ方式。WezTerm からは Alt+hjkl がそのまま届く)
bind -n M-h if -F '#{pane_at_left}'   'send-keys M-h' 'select-pane -L'
bind -n M-j if -F '#{pane_at_bottom}' 'send-keys M-j' 'select-pane -D'
bind -n M-k if -F '#{pane_at_top}'    'send-keys M-k' 'select-pane -U'
bind -n M-l if -F '#{pane_at_right}'  'send-keys M-l' 'select-pane -R'
# Alt+n / Alt+p: ペインを次/前に回転して入れ替え (Emacs 由来 next/previous。
# 旧 WezTerm の RotatePanes の tmux 版)
bind -n M-n rotate-window -D
bind -n M-p rotate-window -U
# prefix + < / > でウィンドウを左右に入れ替え (WezTerm の Alt+,/. からブリッジ)
bind -r < swap-window -d -t -1 \; run-shell -b "sh ~/.local/bin/wezterm-tabs-sync"
bind -r > swap-window -d -t +1 \; run-shell -b "sh ~/.local/bin/wezterm-tabs-sync"
# prefix + H/J/K/L でペインサイズ調整 (-r で連打可。マウスドラッグでも可)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
# prefix + r で設定リロード
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# --- ウィンドウ切替 (WezTerm 以外のクライアント用: iPad/iPhone 等) ---
# Ctrl+Tab は通常の端末プロトコルでは Tab (C-i) と区別できるバイト列を持たない。
# WezTerm では .wezterm.lua が C-b n に変換して送っているため tmux 側は不要だが、
# 拡張キー (modifyOtherKeys / CSI u) 対応クライアント (Blink 等) からは
# C-Tab がそのまま届くので tmux 側でも受ける。
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'
bind -n C-Tab next-window
bind -n C-S-Tab previous-window

# --- コピーモード (vi) ---
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
# コピーは必ず copy-pipe → `tmux load-buffer -w` に通す。
# copy-selection の set-clipboard 経由の OSC 52 は発火しないことがある
# （実測: バッファには入るがクライアントに届かない）が、-w 経路は確実に届く。
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "tmux load-buffer -w -"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "tmux load-buffer -w -"

# --- マウスコピー ---
# ドラッグ選択はボタンを離した瞬間に Windows のクリップボードへ入る
# （Ctrl+Shift+C は不要。押すと WezTerm 側の空選択で上書きされるので注意）。
# ダブルクリック=単語 / トリプルクリック=行 を即コピー。
# 「単語」の区切りはスペースのみ: URL やパス（- @ ? = を含む）を途中で切らず、
# 複数行に折り返していてもダブルクリック一発で全体をコピーできる。
set -g word-separators " "
# nvim などマウスを自前で使うアプリのペインでは、クリックをアプリへそのまま渡す。
bind -n DoubleClick1Pane if -Ft= "#{mouse_any_flag}" "send-keys -M" "copy-mode -M ; send -X select-word ; send -X copy-pipe-and-cancel 'tmux load-buffer -w -'"
bind -n TripleClick1Pane if -Ft= "#{mouse_any_flag}" "send-keys -M" "copy-mode -M ; send -X select-line ; send -X copy-pipe-and-cancel 'tmux load-buffer -w -'"
bind -T copy-mode-vi DoubleClick1Pane send -X select-word \; send -X copy-pipe-and-cancel "tmux load-buffer -w -"
bind -T copy-mode-vi TripleClick1Pane send -X select-line \; send -X copy-pipe-and-cancel "tmux load-buffer -w -"
# prefix + Y: いま画面に見えているペイン全体をまるごとコピー（-J で折り返しを結合）。
# 選択操作なしで「表示中のコード/ログを全部持っていく」ための最終手段。
bind Y run-shell "tmux capture-pane -pJ -t '#{pane_id}' | tmux load-buffer -w -" \; display-message "画面全体をコピーしました"

# --- ペイン名表示 ---
# 各ペインの上辺ボーダーに名前を常時表示し、1 画面のどのペインで何を
# 作業中か一望できるようにする (WezTerm タブ = ウィンドウ名とは別レイヤー)。
# prefix+T で手動命名 (@name)。未設定ペインは実行中コマンド名を自動表示。
# 空入力で手動名を解除して自動表示に戻る。
set -g pane-border-format " #{?pane_active,#[fg=#7aa2f7#,bold],#[fg=#565f89]}#P: #{?@name,#{@name},#{pane_current_command}} #[default]"
bind T command-prompt -p "pane name:" "set -p @name '%%'"
# 1 ペインだけのウィンドウでは名前バーを出さない (分割/クローズのたびに判定。
# リロード直後の既存ウィンドウは次のレイアウト変化から反映)
set-hook -g window-layout-changed 'set -wF pane-border-status "#{?#{==:#{window_panes},1},off,top}"'

# --- ステータスライン ---
# タブ表示は WezTerm のタブバーが担う (#214: 下記の WezTerm 連携フック参照) ため既定は非表示。
# iPad/iPhone 等の WezTerm 以外のクライアントは、tm がグループセッション側で status on
# にして表示する (zshrc の tm 参照)。スタイルはその時のためのもの
# (矢羽根グリフはモバイルのフォントに無いことが多いので使わない)
set -g status off
set -g status-position bottom
set -g status-style "bg=#1f2335,fg=#a9b1d6"
set -g status-left "#[fg=#7aa2f7,bold] #S "
set -g status-left-length 30
set -g status-right " %m/%d %H:%M "
setw -g window-status-format " #I:#W "
setw -g window-status-current-format "#[fg=#ffffff,bg=#ae8b2d,bold] #I:#W "

# --- WezTerm タブバー連携 ---
# ウィンドウ構成が変わるたびに一覧を SetUserVar で WezTerm へ通知し、
# .wezterm.lua がタブバーに tmux ウィンドウをタブ風に描画する
set-hook -g client-attached        'run-shell -b "sh ~/.local/bin/wezterm-tabs-sync"'
set-hook -g session-window-changed 'run-shell -b "sh ~/.local/bin/wezterm-tabs-sync"'
set-hook -g window-linked          'run-shell -b "sh ~/.local/bin/wezterm-tabs-sync"'
set-hook -g window-unlinked        'run-shell -b "sh ~/.local/bin/wezterm-tabs-sync"'
set-hook -g after-rename-window    'run-shell -b "sh ~/.local/bin/wezterm-tabs-sync"'
