# ===== tmux 設定 (devbox セッション層: issue #214 Phase 1) =====
# どのクライアント (WezTerm / 素の ssh / iPad) から入っても
# `tmux new -As main` で同一セッションに attach する運用の土台。

# --- 基本 ---
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"   # truecolor
set -s escape-time 0                        # ESC 遅延をなくす (nvim 用)
set -g history-limit 100000
set -g mouse on
set -g focus-events on                      # nvim の autoread 等に必要
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# --- OSC パススルー ---
# claude_notify の SetUserVar (OSC 1337) や OSC 7 (cwd 通知) を
# tmux 越しに WezTerm まで透過させる。マルチクライアント同期の要。
set -g allow-passthrough on
set -g set-clipboard on

# --- ペイン操作 ---
# prefix はデフォルトの C-b のまま (zsh emacs キーバインドとの衝突が比較的少ない)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
# Alt+矢印でプレフィックスなしペイン移動
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D
# prefix + r で設定リロード
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# --- コピーモード (vi) ---
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# --- ステータスライン ---
set -g status-position bottom
set -g status-style "bg=#1f2335,fg=#a9b1d6"
set -g status-left "#[bold] #S "
set -g status-left-length 20
set -g status-right " %m/%d %H:%M "
setw -g window-status-current-style "bold,fg=#7aa2f7"
setw -g window-status-format " #I:#W "
setw -g window-status-current-format " #I:#W "
